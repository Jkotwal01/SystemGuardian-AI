name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend: pytest + mypy + ruff
  # ──────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check .

      - name: Type-check with mypy
        run: mypy app

      - name: Run tests with coverage
        run: pytest --tb=short -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/htmlcov/

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend: TypeScript + ESLint + Vitest
  # ──────────────────────────────────────────────────────────────────────────
  frontend-checks:
    name: Frontend Checks
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/desktop/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint with ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --run

  # ──────────────────────────────────────────────────────────────────────────
  # Rust: cargo check + cargo test
  # ──────────────────────────────────────────────────────────────────────────
  rust-checks:
    name: Rust Checks
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Tauri dependencies (WebView2)
        run: winget install --id Microsoft.EdgeWebView2Runtime -e --source winget --accept-package-agreements --accept-source-agreements
        continue-on-error: true

      - name: cargo fmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml
