name: Build Windows Installer

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Python (backend) ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build backend executable
        working-directory: backend
        run: |
          pip install -e ".[prod]"
          pip install pyinstaller
          pyinstaller `
            --name sgai-backend `
            --onefile `
            --distpath dist `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan.on `
            --add-data "alembic;alembic" `
            --add-data "alembic.ini;." `
            app/main.py

      - name: Verify backend executable was created
        run: |
          if (-not (Test-Path "backend/dist/sgai-backend.exe")) {
            Write-Error "Backend exe not found at backend/dist/sgai-backend.exe"
            exit 1
          }
          Write-Host "Backend exe found: $(Get-Item 'backend/dist/sgai-backend.exe' | Select-Object -ExpandProperty Length) bytes"

      # ── Node.js (frontend) ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Next.js frontend
        working-directory: apps/desktop/frontend
        run: |
          npm ci
          npm run build

      # ── Rust / Tauri ──────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install WebView2
        run: winget install --id Microsoft.EdgeWebView2Runtime -e --source winget --accept-package-agreements --accept-source-agreements
        continue-on-error: true


      - name: Build Tauri installer
        working-directory: apps/desktop
        run: cargo tauri build

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
